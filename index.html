<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digimon Vpet Favorite Picker</title>
<meta name="description" content="Elegí tu Digimon favorito de cada Vpet original.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <h1>DIGIMON <span>VPET PICKER</span></h1>
  <p class="tagline">Elegí tu favorito de cada dispositivo</p>
</header>

<div class="layout">
  <div class="contenido">

    <!-- Navegación fija: siempre visible para cambiar de vpet -->
    <div class="nav-fija">
      <nav class="controles">
        <div id="tabs" class="tabs"></div>
        <label class="toggle">
          <input type="checkbox" id="toggle-repetidos" checked>
          <span>Mostrar repetidos</span>
        </label>
      </nav>
      <div class="subtabs-carrusel">
        <button id="subtabs-prev" type="button" class="flecha" aria-label="Anterior">◀</button>
        <nav id="subtabs" class="subtabs"></nav>
        <button id="subtabs-next" type="button" class="flecha" aria-label="Siguiente">▶</button>
      </div>
    </div>

    <!-- Roster del vpet seleccionado (uno solo a la vez) -->
    <main id="vpets"></main>

    <!-- Líneas evolutivas: carrusel del vpet activo -->
    <section id="evocharts" class="evocharts">
      <div class="evocharts-header">
        <h2>Líneas evolutivas</h2>
        <button id="btn-charts" type="button">Mostrar imágenes</button>
      </div>
      <div id="chart-view" class="chart-view"></div>
    </section>

  </div>

  <!-- Favoritos: columna fija a la derecha -->
  <aside id="resumen" class="resumen">
    <h2>Mis favoritos</h2>
    <!-- Elegir favorito por vpet (uno por dispositivo) o por versión -->
    <div class="modo-favoritos">
      <button id="modo-vpet" type="button" class="modo">Por Vpet</button>
      <button id="modo-version" type="button" class="modo">Por Versión</button>
    </div>
    <div id="resumen-grid" class="resumen-grid"></div>
    <div class="resumen-acciones">
      <button id="btn-descargar" type="button">Descargar imagen</button>
      <button id="btn-reset" type="button">Borrar selección</button>
    </div>
  </aside>
</div>

<footer class="site-footer">
  <p>Datos de wikimon.net · Inspirado en el Ultimate Favorite Pokémon Picker de CajunAvenger.</p>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
